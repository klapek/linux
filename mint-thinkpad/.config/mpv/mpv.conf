# Grafika i dekodowanie
hwdec=vaapi
vo=gpu
gpu-context=x11egl
fbo-format=rgba16f

# Kluczowe poprawki pod YouTube
ytdl-format="bestvideo[height<=?1080][vcodec^=avc1]+bestaudio[ext=m4a]/best"
# Dodajemy cache-pause=no, żeby nie zamrażał obrazu przy mikro-lagach
cache=yes
cache-pause=no
demuxer-max-bytes=800MiB
demuxer-readahead-secs=120

# Sieć - usuwamy zbędne śmieci, zostawiamy to co stabilne
ytdl-raw-options=force-ipv4=,no-check-certificate=
user-agent="Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0"

# Wyłączamy hr-seek, bo przy streamingu z YT potrafi sypać błędami
hr-seek=yes
hr-seek-framedrop=no

# Zwiększ timeout, żeby nie zrywało przy przycięciach YT
network-timeout=30

# Większy bufor na start - mpv będzie agresywniej dociągać dane
cache=yes
demuxer-max-bytes=1000MiB
demuxer-readahead-secs=300

